<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FNX Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen text-white bg-[radial-gradient(circle_at_top,_#7f1d1d,_#020617)]">

<div class="max-w-6xl mx-auto p-4 space-y-5">

  <!-- HEADER -->

  <div class="bg-black/40 backdrop-blur rounded-2xl p-5 border border-white/10">
    <h1 class="text-2xl sm:text-3xl font-black">FNX Command Center</h1>
    <p class="text-red-300 text-sm">Canyon Clash Planner</p>
  </div>

  <!-- MAP -->

  <div class="bg-black/40 backdrop-blur rounded-2xl p-4 border border-white/10">
    <div class="flex gap-2 mb-3">
      <button onclick="setMap(1)" class="mapBtn bg-red-600 px-3 py-1 rounded-lg text-sm">Map 1</button>
      <button onclick="setMap(2)" class="mapBtn bg-white/10 px-3 py-1 rounded-lg text-sm">Map 2</button>
      <button onclick="setMap(3)" class="mapBtn bg-white/10 px-3 py-1 rounded-lg text-sm">Map 3</button>
    </div>

```
<img id="mapImage" src="./Canyon%20Map%201%20.png" class="rounded-xl w-full">
```

  </div>

  <!-- PLAYERS -->

  <div class="bg-black/40 backdrop-blur rounded-2xl p-4 border border-white/10">
    <h2 class="font-bold mb-3">Assign Players</h2>
    <div id="players"></div>
  </div>

  <!-- TEAMS -->

  <div id="teams" class="space-y-4"></div>

</div>

<script>

const mapImages = {
  1: "./Canyon%20Map%201%20.png",
  2: "./Canyon%20Map%202%20.png",
  3: "./Canyon%20Map%203.png"
};

function setMap(n){
  document.getElementById("mapImage").src = mapImages[n];
}

const roster = ["Ian","Bartyzel","ProBombes","Msciciel","Swahy","Wolfman","BaBaBu"];

let assignments = {};

function render(){

  const playersDiv = document.getElementById("players");
  const teamsDiv = document.getElementById("teams");

  playersDiv.innerHTML = "";
  teamsDiv.innerHTML = "";

  roster.forEach(p => {

    const row = document.createElement("div");
    row.className = "flex justify-between bg-white/10 p-2 rounded-lg mb-2 text-sm";

    const name = document.createElement("span");
    name.innerText = p;

    const select = document.createElement("select");
    select.className = "bg-black/40 rounded px-2";

    ["SUB","A","B","C"].forEach(t=>{
      const opt = document.createElement("option");
      opt.value = t;
      opt.text = t;
      select.appendChild(opt);
    });

    select.value = assignments[p] || "SUB";

    select.onchange = ()=>{
      assignments[p] = select.value;
      render();
    };

    row.appendChild(name);
    row.appendChild(select);
    playersDiv.appendChild(row);

  });

  const teams = {A:[],B:[],C:[]};

  for(let p in assignments){
    if(teams[assignments[p]]) teams[assignments[p]].push(p);
  }

  for(let t in teams){

    const card = document.createElement("div");
    card.className = "bg-black/40 backdrop-blur border border-white/10 rounded-xl p-4";

    const header = document.createElement("div");
    header.className = "flex justify-between items-center cursor-pointer";

    const title = document.createElement("div");
    title.innerHTML = `<b>Team ${t}</b> <span class="text-red-300 text-sm">${teams[t].length} players</span>`;

    const toggle = document.createElement("span");
    toggle.innerText = "+";

    header.appendChild(title);
    header.appendChild(toggle);

    const body = document.createElement("div");
    body.className = "hidden mt-3";

    body.innerHTML = teams[t].map(p=>`<span class="bg-red-500/20 px-2 py-1 rounded mr-1 text-sm">${p}</span>`).join("");

    header.onclick = ()=>{
      const open = body.classList.contains("hidden");
      body.classList.toggle("hidden");
      toggle.innerText = open ? "-" : "+";
    };

    card.appendChild(header);
    card.appendChild(body);
    teamsDiv.appendChild(card);
  }

}

render();

</script>

</body>
</html>
