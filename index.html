  </div>

<script>

const mapImages = {
  1: "./Canyon%20Map%201%20.png",
  2: "./Canyon%20Map%202%20.png",
  3: "./Canyon%20Map%203.png"
};

function setMap(num){
  document.getElementById("mapImage").src = mapImages[num];
}

const roster = ["Ian","Bartyzel","ProBombes","Msciciel","Swahy","Wolfman","BaBaBu"];

let assignments = {};

function render(){

  const playersDiv = document.getElementById("players");
  const teamsDiv = document.getElementById("teams");

  playersDiv.innerHTML = "";
  teamsDiv.innerHTML = "";

  roster.forEach(p => {

    const row = document.createElement("div");
    row.className = "bg-white/10 p-3 rounded mb-2 flex justify-between";

    const name = document.createElement("span");
    name.innerText = p;

    const select = document.createElement("select");

    ["SUB","A","B","C"].forEach(t=>{
      const opt = document.createElement("option");
      opt.value = t;
      opt.text = t;
      select.appendChild(opt);
    });

    select.value = assignments[p] || "SUB";

    select.onchange = ()=>{
      assignments[p] = select.value;
      render();
    };

    row.appendChild(name);
    row.appendChild(select);
    playersDiv.appendChild(row);

  });

  const teams = {A:[],B:[],C:[]};

  for(let p in assignments){
    if(teams[assignments[p]]){
      teams[assignments[p]].push(p);
    }
  }

  for(let t in teams){

    const block = document.createElement("div");
    block.className = "bg-white/10 p-4 rounded";

    block.innerHTML = "<b>Team "+t+"</b><br>"+teams[t].join(", ");
    teamsDiv.appendChild(block);

  }

}

render();

</script>
